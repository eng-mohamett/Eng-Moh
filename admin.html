<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Admin - EngMoh</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-form { padding: 50px; max-width: 500px; margin: auto; background: #12171c; border-radius: 15px; margin-top: 50px;}
        select, input, textarea { margin-bottom: 15px; width: 100%; padding: 10px; border-radius: 5px; border: 1px solid #1f2937; background: #0b0f12; color: white; }
    </style>
</head>
<body>
    <div class="admin-form">
        <h2>Post New Project</h2>
        <input type="password" id="pass" placeholder="Admin Password">
        <select id="type">
            <option value="web">Web Development</option>
            <option value="design">Graphic Design</option>
        </select>
        <input type="text" id="title" placeholder="Project Title" required>
        <textarea id="desc" placeholder="Project Description" rows="3"></textarea>
        <input type="text" id="link" placeholder="Project Link (Optional)">
        <input type="text" id="image" placeholder="Image URL (For Design)">
        <button class="btn" onclick="saveProject()">Upload Project</button>
        <p id="status"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB6eNH-U-4IHjgiLsZ7Ezi6sLYNYlr9uaE",
            databaseURL: "https://engmo-port-default-rtdb.firebaseio.com",
            projectId: "engmo-port"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveProject = function() {
            const pass = document.getElementById('pass').value;
            if(pass !== "1234") return alert("Password-ka waa khalad!");

            const project = {
                type: document.getElementById('type').value,
                title: document.getElementById('title').value,
                description: document.getElementById('desc').value,
                link: document.getElementById('link').value,
                image: document.getElementById('image').value
            };

            push(ref(db, 'projects'), project).then(() => {
                alert("Waa lagu guuleystay!");
                location.reload();
            });
        }
    </script>
</body>
</html>
