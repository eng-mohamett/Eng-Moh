<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <title>Admin - EngMoh</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-form { margin-top: 50px; background: var(--panel); padding: 2rem; border-radius: 12px; }
        select { width: 100%; padding: 0.8rem; border-radius: 10px; background: #0d1217; color: #fff; border: 1px solid #263241; margin-bottom: 1rem; }
    </style>
</head>
<body>
    <div class="container">
        <section class="admin-form">
            <h2>Add New Project</h2>
            <form id="addProjectForm">
                <label>Category</label>
                <select id="projCategory">
                    <option value="web">Web Development</option>
                    <option value="design">Graphic Design</option>
                </select>
                
                <input type="text" id="projTitle" placeholder="Project Title" required>
                <input type="text" id="projLink" placeholder="Link / Image URL" required>
                <textarea id="projDesc" placeholder="Description" rows="3"></textarea>
                
                <button type="submit" class="btn" style="width: 100%;">Upload Project</button>
            </form>
            <p id="status"></p>
        </section>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script>
        const firebaseConfig = { /* Paste your config here again */ };
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        document.getElementById('addProjectForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const category = document.getElementById('projCategory').value;
            const project = {
                title: document.getElementById('projTitle').value,
                link: document.getElementById('projLink').value,
                desc: document.getElementById('projDesc').value
            };

            database.ref('projects/' + category).push(project)
                .then(() => {
                    document.getElementById('status').innerText = "Waa la guuleystay!";
                    e.target.reset();
                });
        });
    </script>
</body>
</html>
